services:
  - type: web
    name: microlearn-ai-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /docs
    envVars:
      - key: APP_ENV
        value: production
      - key: FREE_TRIAL_DOCUMENTS
        value: "3"
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: MAX_PAGES_PER_DOC
        value: "50"
      - key: MAX_PDF_PAGES
        value: "50"
      - key: MAX_PPTX_SLIDES
        value: "50"
      - key: MAX_DOCX_WORDS
        value: "12000"
      - key: MAX_CHUNKS
        value: "20"
      - key: MAX_CHARS_PER_CHUNK
        value: "1800"
      - key: FACTS_PER_CHUNK
        value: "8"
      - key: MCQ_INTERVAL
        value: "4"
      - key: AI_TIMEOUT_SECONDS
        value: "60"
      - key: MAX_RETRIES
        value: "3"
      - key: OPENROUTER_MODEL
        value: ~moonshotai/kimi-latest
      - key: OPENROUTER_FALLBACK_MODELS
        value: google/gemma-4-31b-it:free
      - key: OPENROUTER_MAX_429_WAIT_SECONDS
        value: "30"
      - key: OPENROUTER_SITE_URL
        value: https://your-app.example.com
      - key: OPENROUTER_APP_NAME
        value: Microlearn AI
      - key: TELEGRAM_INITDATA_MAX_AGE_SECONDS
        value: "300"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
